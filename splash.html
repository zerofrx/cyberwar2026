<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber War 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dark:    #080c12;
      --bg:      #0d1320;
      --surface: #111a2c;
      --border:  #1e2e48;
      --text:    #c8d8ee;
      --muted:   #4a6080;
      --accent:  #1a7fd4;
      --blue1:   #0a3a6e;
      --blue2:   #1565c0;
      --blue3:   #4a9fd4;
      --blue4:   #a8d4f5;
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* ── Background grid ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(26,127,212,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26,127,212,.05) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* ── Radial glow center ── */
    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(900px, 120vw);
      height: min(600px, 80vh);
      background: radial-gradient(ellipse at center,
        rgba(21,101,192,.18) 0%,
        rgba(26,127,212,.08) 40%,
        transparent 70%);
      pointer-events: none;
    }

    /* ── Main layout ── */
    .stage {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: clamp(2rem, 5vh, 4rem) clamp(1rem, 5vw, 3rem);
    }

    /* ── Top bar ── */
    .top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg,
        transparent 0%,
        var(--blue1) 15%,
        var(--blue3) 50%,
        var(--blue1) 85%,
        transparent 100%);
      animation: scanline 3s ease-in-out infinite alternate;
    }

    @keyframes scanline {
      from { opacity: .6; }
      to   { opacity: 1; }
    }

    /* ── Logo ── */
    .logo-wrap {
      margin-bottom: 3.5rem;
      opacity: 0;
      transform: translateY(-20px);
      animation: fadeDown .9s ease forwards .2s;
    }

    .logo-wrap img {
      height: clamp(55px, 8vw, 90px);
      width: auto;
      /* Logo azul sobre blanco → se invierte para fondo oscuro */
      filter: brightness(0) invert(1);
      opacity: .88;
    }

    /* ── Eyebrow ── */
    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: clamp(.6rem, 1.4vw, 1rem);
      letter-spacing: clamp(.15em, .35em, .35em);
      color: var(--blue3);
      text-transform: uppercase;
      margin-bottom: clamp(.75rem, 2vh, 1.2rem);
      text-align: center;
      opacity: 0;
      animation: fadeUp .7s ease forwards .6s;
    }

    /* ── Main title ── */
    .title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(4rem, 10vw, 7.5rem);
      font-weight: 900;
      line-height: 1.1;
      text-align: center;
      letter-spacing: .04em;
      background: linear-gradient(135deg,
        #e0f0ff 0%,
        var(--blue4) 30%,
        var(--blue3) 55%,
        var(--blue2) 80%,
        #0a3060 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      animation: fadeUp .9s ease forwards .9s;
      text-shadow: none;
    }

    .title span {
      display: block;
    }

    .year {
      font-size: clamp(2rem, 5vw, 4.5rem);
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      letter-spacing: .15em;
      background: linear-gradient(135deg, var(--muted) 0%, var(--blue3) 50%, var(--muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-top: clamp(.25rem, 1vh, .4rem);
      opacity: 0;
      animation: fadeUp .7s ease forwards 1.2s;
    }

    /* ── Divider ── */
    .divider {
      width: min(320px, 80vw);
      height: 1px;
      margin: clamp(1.5rem, 3.5vh, 2.5rem) auto;
      background: linear-gradient(90deg,
        transparent 0%,
        var(--border) 20%,
        var(--blue3) 50%,
        var(--border) 80%,
        transparent 100%);
      opacity: 0;
      animation: fadeIn .6s ease forwards 1.5s;
    }

    /* ── Tagline ── */
    .tagline {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(1rem, 2.2vw, 1.4rem);
      font-weight: 300;
      color: var(--muted);
      letter-spacing: .08em;
      text-align: center;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp .7s ease forwards 1.7s;
    }

    .tagline strong {
      color: var(--blue4);
      font-weight: 600;
    }

    /* ── Corner decorations ── */
    .corner {
      position: absolute;
      width: clamp(30px, 4vw, 48px);
      height: clamp(30px, 4vw, 48px);
      opacity: .35;
    }
    .corner-tl { top: clamp(1rem,2.5vh,2rem); left: clamp(1rem,2.5vw,2rem); border-top: 1px solid var(--blue3); border-left: 1px solid var(--blue3); }
    .corner-tr { top: clamp(1rem,2.5vh,2rem); right: clamp(1rem,2.5vw,2rem); border-top: 1px solid var(--blue3); border-right: 1px solid var(--blue3); }
    .corner-bl { bottom: clamp(1rem,2.5vh,2rem); left: clamp(1rem,2.5vw,2rem); border-bottom: 1px solid var(--blue3); border-left: 1px solid var(--blue3); }
    .corner-br { bottom: clamp(1rem,2.5vh,2rem); right: clamp(1rem,2.5vw,2rem); border-bottom: 1px solid var(--blue3); border-right: 1px solid var(--blue3); }

    @media (max-width: 400px) {
      .corner { display: none; }
    }

    /* ── Footer label ── */
    .footer-label {
      position: absolute;
      bottom: clamp(1rem, 2.5vh, 2.2rem);
      left: 50%;
      transform: translateX(-50%);
      font-family: 'DM Mono', monospace;
      font-size: clamp(.5rem, 1.1vw, .65rem);
      letter-spacing: .18em;
      color: var(--muted);
      text-transform: uppercase;
      text-align: center;
      width: 90%;
      opacity: 0;
      animation: fadeIn .5s ease forwards 2.2s;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── Scanline overlay (sutil, para dar feel de pantalla) ── */
    .scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,.06) 2px,
        rgba(0,0,0,.06) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    /* ── Canvas network background ── */
    #bgCanvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: .55;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; }
      #bgCanvas { display: none; }
    }
  </style>
</head>
<body>

  <canvas id="bgCanvas"></canvas>
  <div class="scanlines"></div>

  <div class="stage">
    <div class="top-bar"></div>

    <!-- Esquinas decorativas -->
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <!-- Logo BR Basa -->
    <div class="logo-wrap">
      <img src="assets/logo-brbasa.png" alt="BR Basa">
    </div>

    <!-- Eyebrow -->
    <div class="eyebrow">Simulacro de Crisis · Sector Financiero</div>

    <!-- Título principal -->
    <h1 class="title">
      <span>Cyber War</span>
      <span class="year">2026</span>
    </h1>

    <!-- Línea dorada -->
    <div class="divider"></div>

    <!-- Tagline -->
    <p class="tagline">
      <strong>Toma de Decisiones</strong> &nbsp;·&nbsp; Bajo Presión &nbsp;·&nbsp; Alta Consecuencia
    </p>

    <!-- Footer -->
    <div class="footer-label">BR Basa · Simulación Ejecutiva de Ciberseguridad</div>
  </div>

  <script>
    (function () {
      const canvas = document.getElementById('bgCanvas');
      const ctx    = canvas.getContext('2d');

      const GOLD   = '74,159,212';   /* blue3 */
      const RED    = '21,101,192';   /* blue2 */
      const NODE_COUNT = 70;
      const CONNECT_DIST = 180;
      const SPEED  = 0.35;

      let W, H, nodes;

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }

      function makeNode() {
        const angle = Math.random() * Math.PI * 2;
        const speed = (Math.random() * 0.5 + 0.15) * SPEED;
        return {
          x: Math.random() * W,
          y: Math.random() * H,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          r: Math.random() * 2 + 1,
          color: Math.random() > 0.7 ? RED : GOLD,
        };
      }

      function init() {
        resize();
        nodes = Array.from({ length: NODE_COUNT }, makeNode);
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);

        // Move nodes
        for (const n of nodes) {
          n.x += n.vx;
          n.y += n.vy;
          if (n.x < 0 || n.x > W) n.vx *= -1;
          if (n.y < 0 || n.y > H) n.vy *= -1;
        }

        // Draw edges
        for (let i = 0; i < nodes.length; i++) {
          for (let j = i + 1; j < nodes.length; j++) {
            const a = nodes[i], b = nodes[j];
            const dx = a.x - b.x, dy = a.y - b.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < CONNECT_DIST) {
              const alpha = (1 - dist / CONNECT_DIST) * 0.35;
              ctx.beginPath();
              ctx.moveTo(a.x, a.y);
              ctx.lineTo(b.x, b.y);
              ctx.strokeStyle = `rgba(${a.color},${alpha})`;
              ctx.lineWidth = 0.8;
              ctx.stroke();
            }
          }
        }

        // Draw nodes
        for (const n of nodes) {
          ctx.beginPath();
          ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${n.color},0.7)`;
          ctx.fill();
        }

        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', () => { resize(); });
      init();
      draw();
    })();
  </script>

</body>
</html>
