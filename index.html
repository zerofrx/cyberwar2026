<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crisis Cibernética Bancaria — Acceso</title>
  <link rel="stylesheet" href="css/multiplayer.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">

      <!-- Logo -->
      <div class="login-logo">
        Crisis Cibernética<br>Bancaria
        <span>Simulacro Multijugador · Banco Meridian</span>
      </div>

      <!-- Formulario -->
      <form id="loginForm" autocomplete="off">

        <div class="login-field" style="margin-bottom:1rem">
          <label class="login-label" for="inputCode">Código de grupo</label>
          <input
            id="inputCode"
            class="login-input"
            type="text"
            maxlength="6"
            placeholder="Ej: AB3X9K"
            autocomplete="off"
            spellcheck="false"
            required
          >
        </div>

        <div class="login-field" style="margin-bottom:1rem">
          <label class="login-label" for="inputName">Tu nombre</label>
          <input
            id="inputName"
            class="login-input login-name-input"
            type="text"
            maxlength="40"
            placeholder="Nombre completo"
            required
          >
        </div>

        <div class="login-field" style="margin-bottom:1.5rem">
          <label class="login-label" for="inputRole">Tu rol</label>
          <select id="inputRole" class="login-input login-name-input" required style="cursor:pointer">
            <option value="">— Selecciona tu rol —</option>
            <option value="ciso">CISO</option>
            <option value="analyst">Analista de Seguridad</option>
            <option value="legal">Legal</option>
            <option value="comms">Comunicaciones</option>
            <option value="ops">Operaciones</option>
          </select>
        </div>

        <div class="login-error" id="loginError"></div>

        <button type="submit" class="login-btn" id="loginBtn" style="margin-top:.75rem">
          Entrar al simulacro →
        </button>

      </form>

    </div>
  </div>

  <script type="module">
    import { supabase } from './js/supabase-client.js';

    const form       = document.getElementById('loginForm');
    const inputCode  = document.getElementById('inputCode');
    const inputName  = document.getElementById('inputName');
    const inputRole  = document.getElementById('inputRole');
    const loginBtn   = document.getElementById('loginBtn');
    const errorEl    = document.getElementById('loginError');

    // Forzar mayúsculas en el código
    inputCode.addEventListener('input', () => {
      inputCode.value = inputCode.value.toUpperCase();
    });

    form.addEventListener('submit', async e => {
      e.preventDefault();
      const code = inputCode.value.trim().toUpperCase();
      const name = inputName.value.trim();
      const role = inputRole.value;
      if (!code || !name || !role) return;

      setLoading(true);
      errorEl.textContent = '';

      try {
        // Buscar el grupo por código compartido
        const { data: group, error } = await supabase
          .from('groups')
          .select('id, session_id, name')
          .eq('access_code', code)
          .single();

        if (error || !group) {
          showError('Código no válido. Verifica con tu facilitador.');
          return;
        }

        // Verificar que la sesión no haya terminado
        const { data: session } = await supabase
          .from('sessions')
          .select('status')
          .eq('id', group.session_id)
          .single();

        if (session?.status === 'finished') {
          showError('Esta sesión ya ha finalizado.');
          return;
        }

        // Upsert del jugador: (group_id, role) es la clave única
        const { data: player } = await supabase
          .from('players')
          .upsert({
            session_id:   group.session_id,
            group_id:     group.id,
            role,
            display_name: name,
            is_online:    true,
            last_seen:    new Date().toISOString()
          }, { onConflict: 'group_id,role' })
          .select()
          .single();

        // Guardar en localStorage para reconexión
        localStorage.setItem('cw_player_id',  player.id);
        localStorage.setItem('cw_group_id',   group.id);
        localStorage.setItem('cw_session_id', group.session_id);
        localStorage.setItem('cw_role',       role);
        localStorage.setItem('cw_name',       name);
        localStorage.setItem('cw_code',       code);

        window.location.href =
          `group.html?session=${group.session_id}&group=${group.id}&role=${role}`;

      } catch (err) {
        showError('Error de conexión. Intenta de nuevo.');
        console.error(err);
      } finally {
        setLoading(false);
      }
    });

    function setLoading(val) {
      loginBtn.disabled = val;
      loginBtn.textContent = val ? 'Verificando...' : 'Entrar al simulacro →';
    }

    function showError(msg) {
      errorEl.textContent = msg;
    }

    // Reconexión automática si ya hay sesión guardada
    const savedCode = localStorage.getItem('cw_code');
    if (savedCode) {
      inputCode.value = savedCode;
      const savedName = localStorage.getItem('cw_name');
      const savedRole = localStorage.getItem('cw_role');
      if (savedName) inputName.value = savedName;
      if (savedRole) inputRole.value = savedRole;
    }
  </script>
</body>
</html>
